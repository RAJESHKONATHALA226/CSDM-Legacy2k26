<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dadi Institute of Engineering And Technology (Autonomous) Farewell 2026</title>

    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ===============================
    3D GATE
    ================================ -->
    <div id="camera-container">
        <div id="gate-wrapper">
            <div class="gate-door left">
                <div class="door-inner">
                    <div class="gold-accent"></div>
                    <div class="gold-accent"></div>
                    <div class="knob left-knob"></div>
                </div>
            </div>
            <div class="gate-door right">
                <div class="door-inner">
                    <div class="gold-accent"></div>
                    <div class="gold-accent"></div>
                    <div class="knob right-knob"></div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="celebration-canvas"></canvas>

    <!-- ===============================
    HERO SECTION
    ================================ -->
    <main id="hero-content" class="hidden">
        <h1 class="glow-text title">
            🎓 DIET (Autonomous)<br> CSDM Legacy 2k26 Farewell Party
        </h1>

        <div class="info-container">
            <div class="glass-card">
                <span class="icon">📅</span>
                <div>
                    <p class="label">Date & Time</p>
                    <p class="value">17th March 2026 | 09:00 AM - 04:00 PM</p>
                </div>
            </div>
            <div class="glass-card">
                <span class="icon">📍</span>
                <div>
                    <p class="label">Venue</p>
                    <p class="value">Seminar Hall 1</p>
                </div>
            </div>
        </div>

        <div id="countdown" class="glass-card countdown-container"></div>

        <div class="actions">
            <button class="btn primary" onclick="openSlider()">Enter Celebration</button>
            <button class="btn glass" onclick="openEventDetails()">Event Details</button>
            <button class="btn glass" onclick="openApiGallery()">Photo Gallery</button>
        </div>
    </main>

    <!-- ===============================
    PHOTO SLIDER MODAL
    ================================ -->
    <div id="photo-slider" class="hidden">
        <div class="slider-container">
            <button class="close-slider" onclick="closeSlider()">✖</button>
            <img id="slider-image" src="" alt="Farewell Photo">
            <div class="slider-controls">
                <button class="slider-btn" onclick="prevPhoto()">⬅ Prev</button>
                <button class="slider-btn" onclick="nextPhoto()">Next ➡</button>
            </div>
        </div>
    </div>

    <!-- ===============================
    EVENT DETAILS MODAL
    ================================ -->
    <div id="event-details-modal" class="hidden">
        <div class="glass-card detail-modal-content">
            <button class="close-modal" onclick="closeEventDetails()">✖</button>
            <h2 class="glow-text">Event Details</h2>
            <!-- Event info content goes here (keep as in your HTML) -->
        </div>
    </div>

    <!-- ===============================
    API GALLERY MODAL (GRID VIEW)
    ================================ -->
    <div id="api-gallery-modal" class="hidden">
        <div class="glass-card api-gallery-content">
            <button class="close-modal" onclick="closeApiGallery()">✖</button>
            <h2 class="glow-text">Photo Gallery</h2>
            <div id="api-gallery-grid" class="image-grid">
                <div class="loader">Loading Magic...</div>
            </div>
        </div>
    </div>

    <!-- ===============================
    AUDIO
    ================================ -->
    <audio id="gate-audio" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3"></audio>

    <script src="script.js"></script>

</body>
</html>
